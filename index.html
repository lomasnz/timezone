<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timezone Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: #f4f6f8;
}

.header {
  padding: 16px;
  background: white;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.container {
  overflow-x: auto;
  cursor: grab;
}

.grid {
  display: grid;
  grid-template-columns: 200px repeat(48, 80px);
}

.cell {
  border-right: 1px solid #eee;
  border-bottom: 1px solid #eee;
  text-align: center;
  padding: 8px 0;
  font-size: 12px;
}

.label {
  position: sticky;
  left: 0;
  background: white;
  text-align: left;
  padding: 10px;
  font-weight: 600;
  border-right: 1px solid #ddd;
  z-index: 2;
}

.time {
  font-size: 11px;
  color: #666;
}

.headerCell {
  background: #fafafa;
  font-weight: 600;
}

.night {
  background: #2c3e50;
  color: white;
}

.work {
  background: #e3f2fd;
}

.overlap {
  background: #81c784 !important;
  color: black;
}
</style>
</head>

<body>

<div class="header">
  <strong>Timezone Planner</strong>
  <input type="date" id="datePicker">
</div>

<div class="container" id="scroll">
  <div id="grid" class="grid"></div>
</div>

<script>
const zones = [
  { name: "Wellington", tz: "Pacific/Auckland" },
  { name: "Melbourne", tz: "Australia/Melbourne" },
  { name: "Sydney", tz: "Australia/Sydney" },
  { name: "Bangkok", tz: "Asia/Bangkok" },
  { name: "Manchester", tz: "Europe/London" },
  { name: "Houston", tz: "America/Chicago" }
];

function getParts(date, tz) {
  const parts = new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    hour12: false,
    weekday: "short",
    timeZone: tz
  }).formatToParts(date);

  return {
    hour: parseInt(parts.find(p => p.type === "hour").value),
    day: parts.find(p => p.type === "weekday").value
  };
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const selected = document.getElementById("datePicker").value;
  const base = selected ? new Date(selected + "T00:00:00") : new Date();

  // HEADER ROW
  grid.appendChild(document.createElement("div"));

  for (let i = 0; i < 48; i++) {
    const d = new Date(base.getTime() + i * 3600000);
    const cell = document.createElement("div");
    cell.className = "cell headerCell";

    const day = new Intl.DateTimeFormat("en-US", {
      weekday: "short"
    }).format(d);

    cell.innerHTML = `${day}<br>${d.getHours()}`;
    grid.appendChild(cell);
  }

  // Pre-calc overlap
  let overlapMap = Array(48).fill(0);

  zones.forEach(zone => {
    for (let i = 0; i < 48; i++) {
      const d = new Date(base.getTime() + i * 3600000);
      const { hour } = getParts(d, zone.tz);

      if (hour >= 9 && hour <= 17) {
        overlapMap[i]++;
      }
    }
  });

  // ROWS
  zones.forEach(zone => {
    const now = new Date();

    const label = document.createElement("div");
    label.className = "label";

    const local = new Intl.DateTimeFormat("en-US", {
      hour: "numeric",
      minute: "numeric",
      hour12: true,
      timeZone: zone.tz,
      timeZoneName: "short"
    }).format(now);

    label.innerHTML = `${zone.name}<div class="time">${local}</div>`;
    grid.appendChild(label);

    for (let i = 0; i < 48; i++) {
      const d = new Date(base.getTime() + i * 3600000);
      const { hour } = getParts(d, zone.tz);

      const cell = document.createElement("div");
      cell.className = "cell";

      const labelTime = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        hour12: true,
        timeZone: zone.tz
      }).format(d);

      cell.textContent = labelTime;

      if (hour < 6 || hour > 20) {
        cell.classList.add("night");
      }

      if (hour >= 9 && hour <= 17) {
        cell.classList.add("work");
      }

      if (overlapMap[i] >= 3) {
        cell.classList.add("overlap");
      }

      grid.appendChild(cell);
    }
  });
}

// Drag scroll
const scroller = document.getElementById("scroll");
let isDown = false, startX, scrollLeft;

scroller.addEventListener("mousedown", e => {
  isDown = true;
  startX = e.pageX - scroller.offsetLeft;
  scrollLeft = scroller.scrollLeft;
});

scroller.addEventListener("mouseup", () => isDown = false);
scroller.addEventListener("mouseleave", () => isDown = false);

scroller.addEventListener("mousemove", e => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - scroller.offsetLeft;
  const walk = (x - startX) * 1.5;
  scroller.scrollLeft = scrollLeft - walk;
});

// Init
document.getElementById("datePicker").valueAsDate = new Date();
document.getElementById("datePicker").addEventListener("change", render);

render();
</script>

</body>
</html>
