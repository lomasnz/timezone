<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timezone Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: #f4f6f8;
}

.header {
  padding: 16px 24px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  gap: 16px;
}

.header h2 {
  margin: 0;
  font-weight: 600;
}

input[type="date"] {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.container {
  overflow-x: auto;
  cursor: grab;
}

.timeline {
  min-width: 1800px;
}

.row {
  display: flex;
  align-items: center;
  border-bottom: 1px solid #eee;
}

.label {
  width: 200px;
  padding: 12px;
  background: white;
  position: sticky;
  left: 0;
  border-right: 1px solid #eee;
  z-index: 2;
}

.label strong {
  display: block;
}

.label span {
  font-size: 12px;
  color: #666;
}

.hours {
  display: flex;
  position: relative;
}

.cell {
  width: 80px;
  padding: 10px 0;
  text-align: center;
  font-size: 12px;
  border-right: 1px solid #eee;
}

.headerRow {
  background: #fafafa;
  font-weight: 600;
}

.night {
  background: #2c3e50;
  color: white;
}

.nowLine {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: red;
}
</style>
</head>

<body>

<div class="header">
  <h2>Timezone Planner</h2>
  <input type="date" id="datePicker">
</div>

<div class="container" id="scrollContainer">
  <div class="timeline" id="timeline"></div>
</div>

<script>
const zones = [
  { name: "Wellington", tz: "Pacific/Auckland" },
  { name: "Melbourne", tz: "Australia/Melbourne" },
  { name: "Sydney", tz: "Australia/Sydney" },
  { name: "Bangkok", tz: "Asia/Bangkok" },
  { name: "Manchester", tz: "Europe/London" },
  { name: "Houston", tz: "America/Chicago" }
];

function formatHour(date, tz) {
  return new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    hour12: true,
    timeZone: tz
  }).format(date);
}

function getHour(date, tz) {
  return parseInt(new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    hour12: false,
    timeZone: tz
  }).format(date));
}

function render() {
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  const selectedDate = document.getElementById("datePicker").value;
  const now = new Date();

  let baseDate = selectedDate
    ? new Date(selectedDate + "T00:00:00")
    : new Date();

  // Header row
  const headerRow = document.createElement("div");
  headerRow.className = "row headerRow";

  const label = document.createElement("div");
  label.className = "label";
  headerRow.appendChild(label);

  const hours = document.createElement("div");
  hours.className = "hours";

  for (let i = 0; i < 48; i++) {
    const d = new Date(baseDate.getTime() + i * 3600000);

    const cell = document.createElement("div");
    cell.className = "cell";
    cell.textContent = d.getHours();

    hours.appendChild(cell);
  }

  headerRow.appendChild(hours);
  timeline.appendChild(headerRow);

  zones.forEach(zone => {
    const row = document.createElement("div");
    row.className = "row";

    const label = document.createElement("div");
    label.className = "label";

    const localTime = new Intl.DateTimeFormat("en-US", {
      hour: "numeric",
      minute: "numeric",
      hour12: true,
      timeZone: zone.tz
    }).format(now);

    label.innerHTML = `<strong>${zone.name}</strong><span>${localTime}</span>`;
    row.appendChild(label);

    const hours = document.createElement("div");
    hours.className = "hours";

    for (let i = 0; i < 48; i++) {
      const d = new Date(baseDate.getTime() + i * 3600000);
      const hour = getHour(d, zone.tz);

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = formatHour(d, zone.tz);

      if (hour < 6 || hour > 20) {
        cell.classList.add("night");
      }

      hours.appendChild(cell);
    }

    // Current time line (only today)
    if (!selectedDate) {
      const nowLine = document.createElement("div");
      nowLine.className = "nowLine";

      const minutes = now.getMinutes();
      const offset = (minutes / 60) * 80;

      nowLine.style.left = offset + "px";
      hours.appendChild(nowLine);
    }

    row.appendChild(hours);
    timeline.appendChild(row);
  });
}

// Drag to scroll
const container = document.getElementById("scrollContainer");
let isDown = false;
let startX;
let scrollLeft;

container.addEventListener("mousedown", (e) => {
  isDown = true;
  startX = e.pageX - container.offsetLeft;
  scrollLeft = container.scrollLeft;
  container.style.cursor = "grabbing";
});

container.addEventListener("mouseleave", () => {
  isDown = false;
  container.style.cursor = "grab";
});

container.addEventListener("mouseup", () => {
  isDown = false;
  container.style.cursor = "grab";
});

container.addEventListener("mousemove", (e) => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - container.offsetLeft;
  const walk = (x - startX) * 1.5;
  container.scrollLeft = scrollLeft - walk;
});

// Init
document.getElementById("datePicker").valueAsDate = new Date();
document.getElementById("datePicker").addEventListener("change", render);

render();
setInterval(render, 60000);
</script>

</body>
</html>
