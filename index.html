<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timezone Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #f57c00;
  --bg: #f4f6f8;
  --card: #ffffff;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: var(--bg);
}

/* HEADER */
.header {
  display: flex;
  gap: 16px;
  padding: 16px;
  background: var(--card);
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  align-items: center;
}

#clock {
  margin-left: auto;
  font-weight: 600;
}

/* GRID */
.container {
  overflow: auto;
  cursor: grab;
  height: calc(100vh - 70px);
}

.grid {
  display: grid;
  grid-template-columns: 220px repeat(48, 80px);
}

.label {
  position: sticky;
  left: 0;
  background: var(--card);
  padding: 10px;
  border-right: 1px solid #ddd;
  z-index: 3;
}

.headerRow {
  position: sticky;
  top: 0;
  z-index: 4;
  background: var(--card);
}

.cell {
  border-bottom: 1px solid #eee;
  border-right: 1px solid #eee;
  text-align: center;
  padding: 8px;
  font-size: 12px;
}

/* STATES */
.night {
  background: #37474f;
  color: #e0e0e0;
}

.good {
  background: #8bc400;
  color: white;
}

.partial {
  background: #c8e6c9;
  color: #1b5e20;
}

/* Hover = overlay only (important fix) */
.hoverColumn {
  box-shadow: inset 0 0 0 4px rgba(245,124,0,0.4);
}

/* Selected always wins */
.selected {
  background: #f57c00 !important;
  color: white !important;
}

/* TOOLTIP */
.tooltip {
  position: fixed;
  background: black;
  color: white;
  padding: 6px 8px;
  font-size: 11px;
  border-radius: 4px;
  pointer-events: none;
  display: none;
}

/* LEGEND */
.legend {
  padding: 12px 16px;
  background: var(--card);
  border-top: 1px solid #eee;
}

.legendRow {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.legendItem {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}

.legendCell {
  width: 40px;
  height: 24px;
  border-radius: 2px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
  <strong>Timezone Planner</strong>

  <input type="date" id="datePicker">

  <label>Overlap ≥</label>
  <input type="number" id="threshold" value="3" min="1" max="7" style="width:60px">

  <span id="selection"></span>

  <div id="clock"></div>
</div>

<div class="container" id="scroll">
  <div id="grid" class="grid"></div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legendRow">
    <div class="legendItem"><div class="legendCell good"></div>Good</div>
    <div class="legendItem"><div class="legendCell partial"></div>Almost</div>
    <div class="legendItem"><div class="legendCell night"></div>Night</div>
    <div class="legendItem"><div class="legendCell selected"></div>Selected</div>
    <div class="legendItem"><div class="legendCell hoverColumn"></div>Hover</div>
  </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const DEFAULT_ZONES = [
  { name: "Wellington", tz: "Pacific/Auckland" },
  { name: "Melbourne", tz: "Australia/Melbourne" },
  { name: "Sydney", tz: "Australia/Sydney" },
  { name: "Bangkok", tz: "Asia/Bangkok" },
  { name: "Manchester", tz: "Europe/London" },
  { name: "Houston", tz: "America/Chicago" },
  { name: "Denver", tz: "America/Denver" }
];

let people = [];
let zones = [];
let selectedPeople = new Set();

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// GROUP PEOPLE BY TIMEZONE
function groupByTimezone(data) {
  const map = {};

  data.forEach(p => {
    if (!map[p.tz]) map[p.tz] = [];
    map[p.tz].push(p.name);
  });

  return Object.entries(map).map(([tz, names]) => ({
    tz,
    names
  }));
}

// LOAD TEAM JSON
async function loadTeam() {
  const url = getQueryParam("team");

  if (!url) {
    zones = DEFAULT_ZONES.map(z => ({ tz: z.tz, names: [] }));
    return;
  }

  try {
    const res = await fetch(url);
    const data = await res.json();

    people = data;
    zones = groupByTimezone(data);

    // default: all selected
    data.forEach(p => selectedPeople.add(p.name));

  } catch (e) {
    console.error("Failed to load team", e);
    zones = DEFAULT_ZONES.map(z => ({ tz: z.tz, names: [] }));
  }
}

// GET HOUR
function getHour(date, tz) {
  return parseInt(new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    hour12: false,
    timeZone: tz
  }).format(date));
}

// FORMAT
function formatFull(date, tz) {
  return new Intl.DateTimeFormat("en-US", {
    weekday: "short",
    hour: "numeric",
    minute: "numeric",
    timeZone: tz
  }).format(date);
}

// DROPDOWN UI
function createDropdown(zone) {
  const wrapper = document.createElement("div");

  const title = document.createElement("div");
  title.innerHTML = `<strong>${zone.tz}</strong>`;
  wrapper.appendChild(title);

  if (!zone.names.length) return wrapper;

  const select = document.createElement("select");
  select.multiple = true;
  select.style.width = "100%";

  zone.names.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    opt.selected = true;
    select.appendChild(opt);
  });

  select.addEventListener("change", () => {
    selectedPeople.clear();
    document.querySelectorAll("select option:checked")
      .forEach(o => selectedPeople.add(o.value));
    render();
  });

  wrapper.appendChild(select);

  return wrapper;
}

// RENDER
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const threshold = parseInt(document.getElementById("threshold").value);
  const base = new Date();

  grid.appendChild(document.createElement("div"));

  for (let i = 0; i < 48; i++) {
    const d = new Date(base.getTime() + i * 3600000);

    const cell = document.createElement("div");
    cell.className = "cell headerRow";

    const day = new Intl.DateTimeFormat("en-US", { weekday: "short" }).format(d);
    cell.innerHTML = `${day}<br>${d.getHours()}`;

    grid.appendChild(cell);
  }

  let overlap = Array(48).fill(0);

  zones.forEach(zone => {
    const peopleInZone = people.filter(p =>
      p.tz === zone.tz && selectedPeople.has(p.name)
    );

    for (let i = 0; i < 48; i++) {
      const d = new Date(base.getTime() + i * 3600000);
      const hour = getHour(d, zone.tz);

      if (hour >= 9 && hour <= 17) {
        overlap[i] += peopleInZone.length;
      }
    }
  });

  zones.forEach(zone => {
    const label = document.createElement("div");
    label.className = "label";

    label.appendChild(createDropdown(zone));
    grid.appendChild(label);

    for (let i = 0; i < 48; i++) {
      const d = new Date(base.getTime() + i * 3600000);
      const hour = getHour(d, zone.tz);

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.col = i;

      cell.textContent = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        hour12: true,
        timeZone: zone.tz
      }).format(d);

      if (hour < 6 || hour > 20) cell.classList.add("night");

      if (overlap[i] >= threshold) {
        cell.classList.add("good");
      } else if (overlap[i] >= threshold - 1) {
        cell.classList.add("partial");
      }

      cell.addEventListener("mouseenter", () => {
        document.querySelectorAll(`[data-col='${i}']`)
          .forEach(c => c.classList.add("hoverColumn"));
      });

      cell.addEventListener("mouseleave", () => {
        document.querySelectorAll(".hoverColumn")
          .forEach(c => c.classList.remove("hoverColumn"));
      });

      grid.appendChild(cell);
    }
  });
}

// CLOCK
function updateClock() {
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
}

setInterval(updateClock, 1000);
updateClock();

// INIT
async function init() {
  await loadTeam();
  render();
}

document.getElementById("threshold").addEventListener("change", render);

init();
</script>

</body>
</html>
