<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timezone Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #f57c00;
  --bg: #f4f6f8;
  --card: #ffffff;
  --text-muted: #666;
  --org-dark: #37474f;
  --good: #8bc400;
  --almost: #c8e6c9;
  --night: #37474f;
}

* {
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: var(--bg);
  color: #111;
}

.header {
  display: flex;
  gap: 16px;
  padding: 16px;
  background: var(--card);
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  align-items: center;
  flex-wrap: wrap;
}

#baseTzNote {
  color: var(--text-muted);
  font-size: 12px;
}

#clock {
  margin-left: auto;
  font-weight: 600;
}

.container {
  overflow: auto;
}

.grid {
  display: grid;
  grid-template-columns: 320px repeat(48, 80px);
}

.label {
  position: sticky;
  left: 0;
  background: var(--card);
  padding: 10px;
  border-right: 1px solid #ddd;
  border-bottom: 1px solid #eee;
  z-index: 3;
}

.zoneTitle {
  font-weight: 600;
  line-height: 1.2;
}

.zoneSub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.headerRow {
  position: sticky;
  top: 0;
  z-index: 4;
  background: var(--card);
  font-weight: 600;
}

.cell {
  border-bottom: 1px solid #eee;
  border-right: 1px solid #eee;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  min-height: 44px;
}

.night {
  background: var(--night);
  color: #e0e0e0;
}

.good {
  background: var(--good);
  color: white;
}

.partial {
  background: var(--almost);
  color: #1b5e20;
}

.hoverColumn {
  box-shadow: inset 0 0 0 4px rgba(245,124,0,0.4);
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.chip {
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  line-height: 1;
  white-space: nowrap;
}

.chipPerson {
  background: var(--primary);
  color: white;
}

.chipOrg {
  background: var(--org-dark);
  color: white;
}

.chipX {
  font-weight: 700;
  opacity: 0.9;
}

.legend {
  padding: 12px 16px;
  background: var(--card);
  border-top: 1px solid #eee;
}

.legendRow {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}

.legendItem {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}

.legendCell {
  width: 40px;
  height: 24px;
  border-radius: 2px;
  border: 1px solid #ddd;
}

.legendHover {
  box-shadow: inset 0 0 0 4px rgba(245,124,0,0.4);
  background: white;
}

.emptyState {
  padding: 24px 16px;
  color: #555;
}
</style>
</head>
<body>

<div class="header">
  <strong>Timezone Planner</strong>
  <input type="date" id="datePicker">
  <label for="threshold">Overlap ≥</label>
  <input type="number" id="threshold" value="3" min="1" max="99" style="width:80px">
  <div id="baseTzNote"></div>
  <div id="clock"></div>
</div>

<div class="container">
  <div id="grid" class="grid"></div>
  <div id="emptyState" class="emptyState" style="display:none;">No zones to display.</div>
</div>

<div class="legend">
  <div class="legendRow">
    <div class="legendItem"><div class="legendCell good"></div>Good (9am–6:00pm)</div>
    <div class="legendItem"><div class="legendCell partial"></div>Almost (6am–9:00am, 6pm–8pm)</div>
    <div class="legendItem"><div class="legendCell night"></div>Night (before 6am, after 8pm)</div>
    <div class="legendItem"><div class="legendCell"></div>Day (daytime, below overlap)</div>
  </div>
</div>

<script>
const DEFAULT_ZONES = [
  { label: "Wellington", tz: "Pacific/Auckland" },
  { label: "Sydney and Melbourne", tz: "Australia/Sydney" },
  { label: "Houston", tz: "America/Chicago" },
  { label: "London and Manchester", tz: "Europe/London" },
  { label: "Idaho", tz: "America/Denver" },
  { label: "Bangkok", tz: "Asia/Bangkok" }
];

const DEFAULT_TIMEZONE_LABELS = {
  "Pacific/Auckland": "Wellington",
  "Australia/Sydney": "Sydney and Melbourne",
  "America/Chicago": "Houston",
  "Europe/London": "London and Manchester",
  "America/Denver": "Idaho",
  "Asia/Bangkok": "Bangkok"
};

const BROWSER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";

let baseTimezone = BROWSER_TZ;
let timezoneLabels = { ...DEFAULT_TIMEZONE_LABELS };
let people = [];
let zones = [];
let selectedPeople = new Set();

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function getZoneLabel(tz) {
  return timezoneLabels[tz] || DEFAULT_TIMEZONE_LABELS[tz] || tz;
}

function groupByTimezone(data) {
  const map = new Map();

  for (const person of data) {
    if (!person || !person.name || !person.tz) continue;
    if (!map.has(person.tz)) map.set(person.tz, []);
    map.get(person.tz).push({
      name: person.name,
      tz: person.tz,
      type: person.type || "person"
    });
  }

  return Array.from(map.entries()).map(([tz, peopleInZone]) => ({
    tz,
    label: getZoneLabel(tz),
    people: peopleInZone
  }));
}

function buildFallbackZones() {
  return [
    {
      tz: baseTimezone,
      label: getZoneLabel(baseTimezone),
      people: []
    }
  ];
}

async function loadTeam() {
  const url = getQueryParam("team");

  baseTimezone = BROWSER_TZ;
  timezoneLabels = { ...DEFAULT_TIMEZONE_LABELS };

  if (!url) {
    zones = buildFallbackZones();
    people = [];
    selectedPeople = new Set();
    return;
  }

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Failed to fetch team JSON: ${res.status}`);

    const data = await res.json();

    let teamData = [];

    if (Array.isArray(data)) {
      teamData = data;
    } else if (data && typeof data === "object") {
      baseTimezone = typeof data.baseTimezone === "string" && data.baseTimezone
        ? data.baseTimezone
        : BROWSER_TZ;

      if (data.timezones && typeof data.timezones === "object" && !Array.isArray(data.timezones)) {
        timezoneLabels = {
          ...DEFAULT_TIMEZONE_LABELS,
          ...data.timezones
        };
      }

      teamData = Array.isArray(data.team) ? data.team : [];
    } else {
      throw new Error("Team JSON must be an array or an object with team");
    }

    people = teamData
      .filter(p => p && typeof p.name === "string" && typeof p.tz === "string")
      .map(p => ({
        name: p.name,
        tz: p.tz,
        type: p.type || "person"
      }));

    selectedPeople = new Set(people.map(p => p.name));
    zones = people.length ? groupByTimezone(people) : buildFallbackZones();
  } catch (err) {
    console.error("Failed to load team", err);
    zones = buildFallbackZones();
    people = [];
    selectedPeople = new Set();
  }
}

function getHour(date, tz) {
  return parseInt(
    new Intl.DateTimeFormat("en-US", {
      hour: "numeric",
      hour12: false,
      timeZone: tz
    }).format(date),
    10
  );
}

function formatHourLabel(date, tz) {
  return new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    hour12: true,
    timeZone: tz
  }).format(date);
}

function formatHeaderHour(date) {
  return new Intl.DateTimeFormat("en-GB", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
    timeZone: baseTimezone
  }).format(date);
}

function formatHeaderDay(date) {
  const weekday = new Intl.DateTimeFormat("en-US", {
    weekday: "short",
    timeZone: baseTimezone
  }).format(date);
  const day = new Intl.DateTimeFormat("en-US", {
    day: "numeric",
    timeZone: baseTimezone
  }).format(date);
  return `${weekday} ${day}`;
}

function getBaseDate() {
  const selectedDate = document.getElementById("datePicker").value;
  const now = new Date();

  if (selectedDate) {
    const selectedStart = new Date(`${selectedDate}T00:00:00`);
    const todayLocal = new Date();
    const isToday =
      selectedStart.getFullYear() === todayLocal.getFullYear() &&
      selectedStart.getMonth() === todayLocal.getMonth() &&
      selectedStart.getDate() === todayLocal.getDate();

    if (isToday) {
      return new Date(
        todayLocal.getFullYear(),
        todayLocal.getMonth(),
        todayLocal.getDate(),
        todayLocal.getHours(),
        0,
        0,
        0
      );
    }

    return selectedStart;
  }

  return new Date(
    now.getFullYear(),
    now.getMonth(),
    now.getDate(),
    now.getHours(),
    0,
    0,
    0
  );
}

function createChips(zone) {
  const container = document.createElement("div");
  container.className = "chips";

  const selectedZonePeople = zone.people.filter(p => selectedPeople.has(p.name));

  for (const p of selectedZonePeople) {
    const chip = document.createElement("div");
    chip.className = `chip ${p.type === "org" ? "chipOrg" : "chipPerson"}`;
    chip.innerHTML = `<span>${escapeHtml(p.name)}</span><span class="chipX">×</span>`;
    chip.title = "Remove from selection";

    chip.addEventListener("click", () => {
      selectedPeople.delete(p.name);
      render();
    });

    container.appendChild(chip);
  }

  return container;
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function render() {
  const grid = document.getElementById("grid");
  const emptyState = document.getElementById("emptyState");
  const threshold = parseInt(document.getElementById("threshold").value, 10) || 3;
  const base = getBaseDate();

  document.getElementById("baseTzNote").textContent = `Slots shown in ${baseTimezone}`;
  grid.innerHTML = "";

  if (!zones.length) {
    emptyState.style.display = "block";
    return;
  }
  emptyState.style.display = "none";

  grid.appendChild(document.createElement("div"));

  let prevDateKey = null;
  for (let i = 0; i < 48; i++) {
    const d = new Date(base.getTime() + i * 3600000);
    const cell = document.createElement("div");
    cell.className = "cell headerRow";

    const dateKey = new Intl.DateTimeFormat("en-CA", {
      timeZone: baseTimezone,
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).format(d);

    const hourText = formatHeaderHour(d);
    if (i === 0 || dateKey !== prevDateKey) {
      cell.innerHTML = `${formatHeaderDay(d)}<br>${hourText}`;
    } else {
      cell.innerHTML = `&nbsp;<br>${hourText}`;
    }

    prevDateKey = dateKey;
    grid.appendChild(cell);
  }

  const overlap = Array(48).fill(0);

  for (let i = 0; i < 48; i++) {
    let activeZones = 0;

    for (const zone of zones) {
      const selectedInZone = zone.people.filter(p => selectedPeople.has(p.name));
      const zoneCounts = zone.people.length === 0 || selectedInZone.length > 0;
      if (!zoneCounts) continue;

      const d = new Date(base.getTime() + i * 3600000);
      const hour = getHour(d, zone.tz);

      if (hour >= 9 && hour < 18) {
        activeZones += 1;
      }
    }

    overlap[i] = activeZones;
  }

  for (const zone of zones) {
    const label = document.createElement("div");
    label.className = "label";
    label.innerHTML = `
      <div class="zoneTitle">${escapeHtml(zone.label)}</div>
      <div class="zoneSub">${escapeHtml(zone.tz)}</div>
    `;
    label.appendChild(createChips(zone));
    grid.appendChild(label);

    for (let i = 0; i < 48; i++) {
      const d = new Date(base.getTime() + i * 3600000);
      const hour = getHour(d, zone.tz);
      const isNight = hour < 6 || hour > 20;

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.col = String(i);
      cell.textContent = formatHourLabel(d, zone.tz);

      if (isNight) {
        cell.classList.add("night");
      } else if (overlap[i] >= threshold) {
        cell.classList.add("good");
      } else if (overlap[i] === threshold - 1) {
        cell.classList.add("partial");
      }

      cell.addEventListener("mouseenter", () => {
        document.querySelectorAll(`[data-col='${i}']`).forEach(c => {
          c.classList.add("hoverColumn");
        });
      });

      cell.addEventListener("mouseleave", () => {
        document.querySelectorAll(".hoverColumn").forEach(c => {
          c.classList.remove("hoverColumn");
        });
      });

      grid.appendChild(cell);
    }
  }
}

function updateClock() {
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
}

async function init() {
  document.getElementById("datePicker").valueAsDate = new Date();
  await loadTeam();
  render();
  updateClock();
  setInterval(updateClock, 1000);
}

document.getElementById("datePicker").addEventListener("change", render);
document.getElementById("threshold").addEventListener("change", render);

init();
</script>

</body>
</html>
