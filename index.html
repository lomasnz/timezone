<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timezone Planner</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f8;}
.header { padding:12px; background:#fff; display:flex; gap:12px; align-items:center;}
#grid { display:grid; grid-template-columns:300px repeat(48, 80px); overflow:auto;}
.cell { border:1px solid #eee; padding:6px; font-size:12px; text-align:center;}
.headerCell { font-weight:bold; background:#fff;}
.label { position:sticky; left:0; background:#fff; font-weight:bold;}
.good{background:#8bc400;color:#fff;}
.almost{background:#c8e6c9;}
.night{background:#37474f;color:#fff;}
</style>
</head>
<body>

<div class="header">
  <b>Timezone Planner</b>
  <div id="tzNote"></div>
</div>

<div id="grid"></div>

<script>
const DEFAULT_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

let config = {
  baseTimezone: DEFAULT_TZ,
  team: []
};

async function load(){
  const params = new URLSearchParams(location.search);
  const url = params.get("team");

  if(url){
    const res = await fetch(url);
    const data = await res.json();

    // support config wrapper OR plain array
    if(Array.isArray(data)){
      config.team = data;
      config.baseTimezone = DEFAULT_TZ;
    }else{
      config.team = data.team || [];
      config.baseTimezone = data.baseTimezone || DEFAULT_TZ;
    }
  }else{
    // fallback minimal demo
    config.team = [{name:"You", tz:DEFAULT_TZ}];
    config.baseTimezone = DEFAULT_TZ;
  }
}

function getHour(d, tz){
  return parseInt(new Intl.DateTimeFormat('en-US',{
    hour:'numeric',hour12:false,timeZone:tz
  }).format(d));
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  document.getElementById("tzNote").innerText = "Slots shown in " + config.baseTimezone;

  let now = new Date();
  now.setMinutes(0,0,0);

  // header
  grid.appendChild(document.createElement("div"));

  let prevDay=null;

  for(let i=0;i<48;i++){
    let d = new Date(now.getTime()+i*3600000);

    let day = new Intl.DateTimeFormat('en-US',{
      weekday:'short',day:'numeric',timeZone:config.baseTimezone
    }).format(d);

    let hour = new Intl.DateTimeFormat('en-GB',{
      hour:'2-digit',minute:'2-digit',hour12:false,timeZone:config.baseTimezone
    }).format(d);

    let div=document.createElement("div");
    div.className="cell headerCell";

    if(day!==prevDay){
      div.innerHTML=day+"<br>"+hour;
      prevDay=day;
    }else{
      div.innerHTML="&nbsp;<br>"+hour;
    }

    grid.appendChild(div);
  }

  // group by tz
  let zones = {};
  config.team.forEach(p=>{
    if(!zones[p.tz]) zones[p.tz]=[];
    zones[p.tz].push(p.name);
  });

  Object.keys(zones).forEach(tz=>{
    let label=document.createElement("div");
    label.className="cell label";
    label.innerText=tz;
    grid.appendChild(label);

    for(let i=0;i<48;i++){
      let d=new Date(now.getTime()+i*3600000);
      let h=getHour(d,tz);

      let cls="cell";
      if(h<6||h>20) cls+=" night";
      else if(h>=9&&h<17) cls+=" good";
      else if(h>=7&&h<19) cls+=" almost";

      let div=document.createElement("div");
      div.className=cls;
      div.innerText=h+":00";
      grid.appendChild(div);
    }
  });
}

(async()=>{
  await load();
  render();
})();
</script>

</body>
</html>
