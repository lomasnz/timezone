<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timezone Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #f57c00;
  --bg: #f4f6f8;
  --card: #ffffff;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: var(--bg);
}

.header {
  display: flex;
  gap: 16px;
  padding: 16px;
  background: var(--card);
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  align-items: center;
}

#clock {
  margin-left: auto;
  font-weight: 600;
}

.container {
  overflow: auto;
  cursor: grab;
  height: calc(100vh - 70px);
  position: relative;
}

.grid {
  display: grid;
  grid-template-columns: 220px repeat(48, 80px);
}

.label {
  position: sticky;
  left: 0;
  background: var(--card);
  padding: 10px;
  border-right: 1px solid #ddd;
  z-index: 3;
}

.headerRow {
  position: sticky;
  top: 0;
  z-index: 4;
  background: var(--card);
}

.cell {
  border-bottom: 1px solid #eee;
  border-right: 1px solid #eee;
  text-align: center;
  padding: 8px;
  font-size: 12px;
}

.night {
  background: #37474f;
  color: #e0e0e0;
}

.good {
  background: #4caf50;
  color: white;
}

.partial {
  background: #a5d6a7;
}

.tooltip {
  position: fixed;
  background: black;
  color: white;
  padding: 6px 8px;
  font-size: 11px;
  border-radius: 4px;
  pointer-events: none;
  display: none;
}

.selected {
  outline: 2px solid var(--primary);
}

/* NEW: vertical hover band */
.hoverColumn {
  background: rgba(0,0,0,0.08) !important;
}
</style>
</head>

<body>

<div class="header">
  <strong>Timezone Planner</strong>

  <input type="date" id="datePicker">

  <label>Overlap ≥</label>
  <input type="number" id="threshold" value="3" min="1" max="7" style="width:60px">

  <span id="selection"></span>

  <div id="clock"></div>
</div>

<div class="container" id="scroll">
  <div id="grid" class="grid"></div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const zones = [
  { name: "Wellington", tz: "Pacific/Auckland" },
  { name: "Melbourne", tz: "Australia/Melbourne" },
  { name: "Sydney", tz: "Australia/Sydney" },
  { name: "Bangkok", tz: "Asia/Bangkok" },
  { name: "Manchester", tz: "Europe/London" },
  { name: "Houston", tz: "America/Chicago" },
  { name: "Denver", tz: "America/Denver" }
];

let selectedCell = null;

function getHour(date, tz) {
  return parseInt(new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    hour12: false,
    timeZone: tz
  }).format(date));
}

function formatFull(date, tz) {
  return new Intl.DateTimeFormat("en-US", {
    weekday: "short",
    hour: "numeric",
    minute: "numeric",
    timeZone: tz
  }).format(date);
}

function clearHover() {
  document.querySelectorAll(".hoverColumn").forEach(c => c.classList.remove("hoverColumn"));
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const threshold = parseInt(document.getElementById("threshold").value);
  const selectedDate = document.getElementById("datePicker").value;
  const base = selectedDate ? new Date(selectedDate + "T00:00:00") : new Date();

  // HEADER
  grid.appendChild(document.createElement("div"));

  for (let i = 0; i < 48; i++) {
    const d = new Date(base.getTime() + i * 3600000);

    const cell = document.createElement("div");
    cell.className = "cell headerRow";

    const day = new Intl.DateTimeFormat("en-US", { weekday: "short" }).format(d);

    cell.innerHTML = `${day}<br>${d.getHours()}`;
    grid.appendChild(cell);
  }

  // overlap calc
  let overlap = Array(48).fill(0);

  zones.forEach(z => {
    for (let i = 0; i < 48; i++) {
      const d = new Date(base.getTime() + i * 3600000);
      const hour = getHour(d, z.tz);

      if (hour >= 9 && hour <= 17) overlap[i]++;
    }
  });

  zones.forEach(zone => {
    const label = document.createElement("div");
    label.className = "label";

    const now = new Date();
    const local = new Intl.DateTimeFormat("en-US", {
      hour: "numeric",
      minute: "numeric",
      timeZone: zone.tz,
      timeZoneName: "short"
    }).format(now);

    label.innerHTML = `<strong>${zone.name}</strong><div>${local}</div>`;
    grid.appendChild(label);

    for (let i = 0; i < 48; i++) {
      const d = new Date(base.getTime() + i * 3600000);
      const hour = getHour(d, zone.tz);

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.col = i;

      cell.textContent = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        hour12: true,
        timeZone: zone.tz
      }).format(d);

      if (hour < 6 || hour > 20) cell.classList.add("night");

      if (overlap[i] >= threshold) {
        cell.classList.add("good");
      } else if (overlap[i] === threshold - 1) {
        cell.classList.add("partial");
      }

      // tooltip
      cell.addEventListener("mousemove", e => {
        const tip = document.getElementById("tooltip");
        tip.style.display = "block";
        tip.style.left = e.pageX + 10 + "px";
        tip.style.top = e.pageY + 10 + "px";
        tip.innerHTML = `${zone.name}<br>${formatFull(d, zone.tz)}`;
      });

      cell.addEventListener("mouseleave", () => {
        document.getElementById("tooltip").style.display = "none";
        clearHover();
      });

      // NEW: vertical hover band
      cell.addEventListener("mouseenter", () => {
        clearHover();
        const col = cell.dataset.col;
        document.querySelectorAll(`[data-col='${col}']`).forEach(c => {
          c.classList.add("hoverColumn");
        });
      });

      // select
      cell.addEventListener("click", () => {
        if (selectedCell) selectedCell.classList.remove("selected");
        cell.classList.add("selected");
        selectedCell = cell;

        document.getElementById("selection").innerText =
          `Selected: ${formatFull(d, zone.tz)}`;
      });

      grid.appendChild(cell);
    }
  });
}

// CLOCK
function updateClock() {
  const now = new Date();

  const time = new Intl.DateTimeFormat("en-NZ", {
    hour: "numeric",
    minute: "numeric",
    second: "numeric",
    hour12: true,
    timeZone: "Pacific/Auckland"
  }).format(now);

  document.getElementById("clock").innerText = "Now: " + time;
}

setInterval(updateClock, 1000);
updateClock();

// DRAG SCROLL
const scroller = document.getElementById("scroll");
let isDown = false, startX, scrollLeft;

scroller.addEventListener("mousedown", e => {
  isDown = true;
  startX = e.pageX - scroller.offsetLeft;
  scrollLeft = scroller.scrollLeft;
});

scroller.addEventListener("mouseup", () => isDown = false);
scroller.addEventListener("mouseleave", () => isDown = false);

scroller.addEventListener("mousemove", e => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - scroller.offsetLeft;
  const walk = (x - startX) * 1.5;
  scroller.scrollLeft = scrollLeft - walk;
});

document.getElementById("datePicker").valueAsDate = new Date();
document.getElementById("datePicker").addEventListener("change", render);
document.getElementById("threshold").addEventListener("change", render);

render();
</script>

</body>
</html>
