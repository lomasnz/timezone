<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timezone Planner</title>
<style>
body { font-family: Arial; }
.grid { display: grid; grid-template-columns: 200px repeat(24, 1fr); }
.cell { border: 1px solid #ddd; padding: 4px; font-size: 12px; text-align: center; }
.good { background:#8bc34a; }
.almost { background:#c5e1a5; }
.night { background:#37474f; color:white; }
.day { background:white; }
.header { font-weight:bold; }
.legend { margin-top:10px; }
.box { display:inline-block; width:14px; height:14px; margin-right:5px; border:1px solid #ccc;}
</style>
</head>
<body>

<h3>Timezone Planner</h3>
<div id="info"></div>
<div id="grid" class="grid"></div>

<div class="legend">
<div><span class="box good"></span> Good</div>
<div><span class="box almost"></span> Almost</div>
<div><span class="box night"></span> Night</div>
<div><span class="box day"></span> Daytime, below overlap</div>
</div>

<script>
const TZ_LABELS = {
  "Pacific/Auckland": "Wellington",
  "Australia/Sydney": "Sydney and Melbourne",
  "America/Chicago": "Houston",
  "America/Denver": "Idaho",
  "Europe/London": "London and Manchester",
  "Asia/Bangkok": "Bangkok"
};

const timezones = Object.keys(TZ_LABELS);

const baseTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
document.getElementById("info").innerText = "Slots shown in " + baseTz;

function getLocalHour(date, tz) {
  return parseInt(new Intl.DateTimeFormat('en-US', {
    hour: 'numeric',
    hour12: false,
    timeZone: tz
  }).format(date));
}

function getLocalDay(date, tz) {
  return new Intl.DateTimeFormat('en-US', {
    weekday: 'short',
    day: 'numeric',
    timeZone: tz
  }).format(date);
}

function classify(hour){
  if(hour < 6 || hour >= 20) return "night";
  if(hour >= 9 && hour < 17) return "good";
  if(hour >= 7 && hour < 19) return "almost";
  return "day";
}

const grid = document.getElementById("grid");

// current hour start
let now = new Date();
now.setMinutes(0,0,0);

// header row
grid.appendChild(document.createElement("div"));

for(let i=0;i<24;i++){
  let d = new Date(now.getTime() + i*3600000);
  let hour = new Intl.DateTimeFormat('en-GB',{hour:'2-digit',hour12:false,timeZone:baseTz}).format(d);
  let day = getLocalDay(d, baseTz);

  let div = document.createElement("div");
  div.className="cell header";
  div.innerHTML = day + "<br>" + hour + ":00";
  grid.appendChild(div);
}

// rows
timezones.forEach(tz=>{
  let label = TZ_LABELS[tz];
  let labelDiv = document.createElement("div");
  labelDiv.className="cell header";
  labelDiv.innerText = label;
  grid.appendChild(labelDiv);

  for(let i=0;i<24;i++){
    let d = new Date(now.getTime() + i*3600000);
    let hour = getLocalHour(d, tz);

    let cls = classify(hour);

    let div = document.createElement("div");
    div.className = "cell " + cls;
    div.innerText = hour + ":00";
    grid.appendChild(div);
  }
});
</script>

</body>
</html>
